name: Block Generated File Edits

# Reusable workflow: close PRs that hand-edit oagen-generated files.
#
# Auto-generated files (those whose header carries
# "This file is auto-generated by oagen. Do not edit.") must not be edited by
# hand — changes are overwritten on the next regeneration. This workflow closes
# any PR that edits a generated file outside its hand-maintainable
# "@oagen-ignore-start"/"@oagen-ignore-end" regions and explains why. The
# detector keys off the marker *text*, so it works for every SDK language
# (C#, Kotlin, TypeScript, PHP, Python, Ruby, Go, Rust, Elixir, …).
#
# Consume it from an SDK with a tiny caller workflow:
#
#   name: Block Generated File Edits
#   on:
#     pull_request_target:
#       # No "reopened": a maintainer reopening to override the bot should not
#       # be immediately re-closed. A follow-up push (synchronize) re-checks.
#       types: [opened, synchronize]
#   jobs:
#     block-generated-edits:
#       uses: workos/actions/.github/workflows/block-generated-edits.yml@main
#       secrets: inherit
#
# Requires (already present on SDK repos for the bot's other workflows):
#   - vars.SDK_BOT_APP_ID
#   - secrets.SDK_BOT_PRIVATE_KEY   (passed via `secrets: inherit`)

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: block-generated-edits-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  block-generated-edits:
    name: Close PRs that edit generated files
    runs-on: ubuntu-latest
    # Never auto-close PRs that legitimately rewrite generated files:
    #   - the SDK Automation Bot's autogen ("regenerate from spec") and
    #     release-please PRs (authored by the bot), and
    #   - any PR explicitly marked with the "autogenerated" label (e.g. a
    #     maintainer-run regeneration). The bot applies this label when it
    #     opens its PRs, so the label must be present at open/synchronize
    #     time for the exemption to take effect.
    if: >-
      github.event.pull_request.user.login != 'workos-sdk-automation[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'autogenerated')
    steps:
      - name: Generate SDK Automation Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SDK_BOT_APP_ID }}
          private-key: ${{ secrets.SDK_BOT_PRIVATE_KEY }}
          # Org-wide token: the job clones both the caller SDK and this
          # (workos/actions) repo, so it must reach more than the caller alone.
          owner: workos

      # pull_request_target checks out the trusted base branch of the *caller*
      # SDK repo (the head of the PR is never executed). We need full history
      # so we can diff against the PR's merge base.
      - name: Checkout SDK base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # The detector script lives in this repo, not the SDK. Pull just that
      # file, at the exact commit of the reusable workflow being run
      # (job_workflow_sha), so the script always matches this workflow body
      # regardless of the ref the SDK pinned.
      - name: Checkout detector script
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: workos/actions
          ref: ${{ github.job_workflow_sha }}
          path: .oagen-guard
          sparse-checkout: scripts/check_generated_edits.ts
          sparse-checkout-cone-mode: false
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      # The detector is plain TypeScript run via Node's native type stripping —
      # no install or build step. Node 24 strips types by default.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Detect edits to generated files
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # refs/pull/<n>/head is exposed on the base repo even for fork PRs,
          # so we can read (never run) the PR's files via git alone.
          git fetch --no-tags origin "refs/pull/${PR_NUMBER}/head"
          HEAD_SHA="$(git rev-parse FETCH_HEAD)"
          MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"

          # The script prints one offending file path per line (a generated
          # file changed outside its fenced regions) and exits non-zero only
          # on real failures, so the job fails loudly rather than letting an
          # edit slip through.
          node .oagen-guard/scripts/check_generated_edits.ts "$MERGE_BASE" "$HEAD_SHA" > offenders.txt

          if [ -s offenders.txt ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "Generated files edited outside fenced regions:"
            cat offenders.txt
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
            echo "No generated files edited outside fenced regions."
          fi

      - name: Comment and close
        if: steps.detect.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # If the PR is already closed (e.g. a repeated synchronize), don't
          # post a duplicate comment or error on a second close.
          state="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq .state)"
          if [ "$state" != "OPEN" ]; then
            echo "PR #${PR_NUMBER} is already ${state}; nothing to do."
            exit 0
          fi

          {
            echo "## 🤖 This pull request was closed automatically"
            echo
            echo "It edits files that are **auto-generated by \`oagen\`** (each header carries \`This file is auto-generated by oagen. Do not edit.\`). Hand edits to generated code are overwritten the next time the SDK is regenerated from the OpenAPI spec, so they can't be merged."
            echo
            echo "**Generated files changed outside their hand-maintainable regions:**"
            echo
            while IFS= read -r f; do
              [ -n "$f" ] && echo "- \`$f\`"
            done < offenders.txt
            echo
            echo "### What to do instead"
            echo
            echo "- **Generated code** (models, resources, client wiring): make the change upstream in the OpenAPI spec / \`oagen\` so it lands on the next regeneration."
            echo "- **Hand-maintained code inside a generated file**: only the regions fenced by \`@oagen-ignore-start\` … \`@oagen-ignore-end\` may be edited by hand. Keep your changes within those fences."
            echo
            echo "If you believe this was closed in error, a maintainer can reopen the PR."
          } > comment.md

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file comment.md
          gh pr close "$PR_NUMBER" --repo "$REPO"
